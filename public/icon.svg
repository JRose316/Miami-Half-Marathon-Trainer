<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3D6B"/>
      <stop offset="50%" style="stop-color:#FF9500"/>
      <stop offset="100%" style="stop-color:#FFD600"/>
    </linearGradient>
    <path id="topArc" d="M 100,256 a 156,156 0 1,1 312,0"/>
    <path id="bottomArc" d="M 100,256 a 156,156 0 0,0 312,0"/>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Circle outline -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <!-- Emoji -->
  <text x="256" y="290" font-size="190" text-anchor="middle" dominant-baseline="middle">👟</text>
  <!-- Top arc text -->
  <text font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">HALF MARATHON</textPath>
  </text>
  <!-- Bottom arc text -->
  <text font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white" letter-spacing="6">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">TRAINING</textPath>
  </text>
</svg>
